<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina — Inteligência em Saúde Psicossocial</title>
    <meta name="description" content="Lumina é a plataforma de inteligência em saúde psicossocial para empresas, com leitura de contexto, cuidado contínuo e apoio à decisão." />
    <meta name="theme-color" content="#0C3D4E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lumina" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logoCARE.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Kill stale dev service workers before app loads
      if (location.hostname === "localhost" && "serviceWorker" in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        regs.forEach((r) => r.unregister());
        if (typeof caches !== "undefined") {
          const keys = await caches.keys();
          keys.forEach((n) => caches.delete(n));
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
